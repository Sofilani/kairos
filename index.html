<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Webcam</title>
    <link rel="stylesheet" href="visual.css">
</head>

<body>
<h1>Painel de Monitoramento</h1>

<div class="container-cameras">
    <div class="camera-box">
        <h3>Câmera 1</h3>
        <video id="camera1" autoplay></video>
        <canvas id="canvas1"></canvas>
    </div>

    <div class="camera-box">
        <h3>Câmera 2</h3>
        <video id="camera2" autoplay></video>
        <canvas id="canvas2"></canvas>
    </div>

    <div class="camera-box">
        <h3>Câmera 3</h3>
        <video id="camera3" autoplay></video>
        <canvas id="canvas3"></canvas>
    </div>

    <div class="camera-box">
        <h3>Câmera 4</h3>
        <video id="camera4" autoplay></video>
        <canvas id="canvas4"></canvas>
    </div>
</div>

<br>

<button onclick="ligarCamera(1)">Ligar câmera 1</button>
<button onclick="desligarCamera(1)">Desligar câmera 1</button>
<script src="script.js"></script>
</body>
</html>
