<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Webcam</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 30px;
    }

    video {
      width: 640px;
      border: 2px solid black;
      border-radius: 10px;
    }

    button {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>Visualização da Webcam</h1>

  <video id="camera" autoplay></video>
  <canvas id="canvas"></canvas>

  <br>

  <button onclick="ligarCamera()">Ligar câmera</button>
  <button onclick="desligarCamera()">Desligar câmera</button>

  <script>
    let stream;
    const video = document.getElementById("camera");
    async src="https://docs.opencv.org/4.x/opencv.js";

    async function ligarCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
      } catch (erro) {
        alert("Erro ao acessar câmera: " + erro);
      }
    }

    function desligarCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }
  </script>

</body>
</html>
