<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Webcam</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 30px;
    }

    video {
      width: 640px;
      border: 2px solid black;
      border-radius: 10px;
    }

    button {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>Visualização da Webcam</h1>

  <video id="camera" autoplay></video>
  <canvas id="canvas"></canvas>

  <br>

  <button onclick="ligarCamera()">Ligar câmera</button>
  <button onclick="desligarCamera()">Desligar câmera</button>
<script src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script>
    let stream;
    const video = document.getElementById("camera");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
   

    async function ligarCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();

      if (typeof cv !== "undefined") {
        processarFrame();
      } else {
        alert("OpenCV ainda não carregou.");
      }
    };

  } catch (erro) {
    alert("Erro ao acessar câmera: " + erro);
    console.error(erro);
  }
}
    function desligarCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }

    function processarFrame() {
    if (!stream) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    let edges = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.Canny(gray, edges, 50, 100);

    cv.imshow("canvas", edges);

    src.delete();
    gray.delete();
    edges.delete();

    requestAnimationFrame(processarFrame);
}
  </script>

</body>
</html>
